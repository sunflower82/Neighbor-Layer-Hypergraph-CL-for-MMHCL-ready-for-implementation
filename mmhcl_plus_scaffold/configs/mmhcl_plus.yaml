# MMHCL+ configuration — aligns with MMHCLPlusConfig dataclass in mmhcl_plus/config.py
# All values override the dataclass defaults; missing keys fall back to defaults.

model:
  in_dim: 64
  hidden_dim: 64
  projector_hidden_dim: 2048
  projector_out_dim: 8192          # "dimensionality paradox" resolved (TEX §4.4)
  n_layers: 3
  max_g_layers: 2                  # g ≤ 2 per Corollary 1 (TEX §3.3)
  fusion_hidden_dim: 128
  use_checkpoint: true

loss:
  # Temperature schedule: τ(t) = max(τ_min, τ_max · γ^t)
  tau: 0.2                         # kept for backward-compat; overridden by tau_max
  tau_max: 0.5
  tau_min: 0.05
  tau_gamma: 0.99
  # Skip CL losses during BPR warmup
  warmup_epochs: 5
  # Barlow Twins
  barlow_lambda: 0.005
  # Chunked InfoNCE
  info_nce_chunk_size: 1024
  # GradNorm
  gradnorm_alpha: 1.5
  # Per-task loss weights (initial values; GradNorm adjusts at runtime)
  dirichlet_weight: 0.1
  bpr_weight: 1.0
  u2u_weight: 1.0
  i2i_weight: 1.0
  align_weight: 1.0

topology:
  ann_backend: torch               # set to 'faiss' if faiss-gpu is installed
  ann_k: 32
  ann_metric: ip
  purification_tau: 0.2
  ema_momentum: 0.99               # BYOL-style teacher momentum
  w_ema_alpha: 0.9                 # W_ema EMA blend coefficient α
  update_interval: 5               # W_ema lazy update every T epochs

system:
  device: cuda
  seed: 2026
  checkpoint_layers: [1, 2]       # apply activation checkpointing to layers 1 and 2
  log_every: 1
  epochs: 15                       # increase for real training (warmup=5 leaves 10 CL epochs)
  lr: 0.001
